<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Westside Earthworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo"><a href="index.html"><img src="logo.png" alt="Westside Earthworks" height="34"></a></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="our-story.html">Our Story</a></li>
      </ul>
      <div class="nav-contact">
        <span>sam@westsideearthmi.com</span>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1>Contact</h1>
    </section>

    <section class="page-content">
      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        <input type="hidden" name="access_key" value="2753c938-9925-42cb-89dc-0231a66cf513">
        <input type="hidden" name="subject" value="New Contact Form Submission — Westside Earthworks">
        <input type="hidden" name="redirect" value="false">
        <input type="checkbox" name="botcheck" style="display:none">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 555-5555">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required rows="5" placeholder="Tell us about your project..."></textarea>
        </div>

        <button type="submit" class="btn btn-submit">Send Message</button>

        <p class="form-result" id="form-result"></p>
      </form>
    </section>
  </main>

  <script>
    const form = document.querySelector('.contact-form');
    const result = document.getElementById('form-result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: data });
      const json = await res.json();
      if (json.success) {
        result.textContent = "Thanks! We'll be in touch soon.";
        result.className = 'form-result success';
        form.reset();
      } else {
        result.textContent = 'Something went wrong. Please try again or call us directly.';
        result.className = 'form-result error';
      }
    });
  </script>

  <footer>
    <p>&copy; 2026 Westside Earthworks. All rights reserved.</p>
  </footer>
</body>
</html>
